apiVersion: rbac.authorization.k8s.io/v1
# This role binding allows "jane" to read pods in the "default" namespace.
# You need to already have a Role named "pod-reader" in that namespace.
kind: RoleBinding
metadata:
  name: roboshop-admin
  namespace: roboshop 
subjects:
- kind: Group
  name: roboshop-admin-access-all-v1-g 
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role 
  name: roboshop-admin-accesses-all-resources-v1 
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: roboshop-admin
subjects:
- kind: Group
  name: roboshop-admin-access-clusterlevel-pv-g 
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole 
  name: roboshop-admin-acesses-clusterlevel-pv 
  apiGroup: rbac.authorization.k8s.io
